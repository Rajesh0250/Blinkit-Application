apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: blinkit-demo
spec:
  selector:
    app: api-gateway
  ports:
    - port: 3005
      targetPort: 3005
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: blinkit-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
        - name: api-gateway
          image: blinkit/api-gateway:latest
          env:
            - name: PORT
              value: "3005"
            - name: AUTH_SERVICE_URL
              value: http://auth-service:3001
            - name: CATALOG_SERVICE_URL
              value: http://catalog-service:3002
            - name: ORDERS_SERVICE_URL
              value: http://orders-service:3003
          ports:
            - containerPort: 3005
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: blinkit-demo
spec:
  type: LoadBalancer
  selector:
    app: frontend
  ports:
    - port: 80
      targetPort: 3000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: blinkit-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: blinkit/frontend:latest
          env:
            - name: PORT
              value: "3000"
            - name: API_GATEWAY_URL
              value: http://api-gateway:3005
          ports:
            - containerPort: 3000
