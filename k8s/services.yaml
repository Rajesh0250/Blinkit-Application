apiVersion: v1
kind: Service
metadata:
  name: auth-service
  namespace: blinkit-demo
spec:
  selector:
    app: auth-service
  ports:
    - port: 3001
      targetPort: 3001
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: blinkit-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      containers:
        - name: auth-service
          image: blinkit/auth-service:latest
          env:
            - name: PORT
              value: "3001"
            - name: DB_HOST
              value: postgres
            - name: DB_PORT
              value: "5432"
            - name: DB_NAME
              value: blinkitdb
            - name: DB_USER
              value: blinkit
            - name: DB_PASSWORD
              value: blinkitpass
          ports:
            - containerPort: 3001
---
